- id: GDPR-ART48-0-foreign-authority-requests-international-agreement
  title: GDPR Art 48(None)
  requirement: Do not recognise or enforce a judgment of a court or tribunal and/or
    decision of an administrative authority of a third country requiring a controller
    or processor to transfer or disclose personal data unless it is based on an international
    agreement (such as a mutual legal assistance treaty) in force between the requesting
    third country and the Union or a Member State, without prejudice to other transfer
    grounds under Chapter V.
