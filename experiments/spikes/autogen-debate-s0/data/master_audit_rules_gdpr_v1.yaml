- id: GDPR-ART49-INTERP-01-2020-derogations-restrictive
  title: GDPR Art 49(EDPB Rec 01/2020)
  requirement: 'Apply Article 49 derogations restrictively: derogations are for specific
    situations and cannot become the rule; they may be relied upon only in the absence
    of an adequacy decision and appropriate safeguards.'
  audit_procedure:
  - order: 1
    instruction: 'Confirm trigger scope: When considering relying on an Article 49
      derogation for transfers.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Derogation rationale showing specific situation/occasional nature
      and why Art 45/46 are not used.
  - category: procedural
    expectation: Governance to prevent routine use of derogations as a steady-state
      transfer mechanism.
  finding_criteria:
  - id: FC-01
    if_condition: IF an organisation uses Art 49 derogations as a routine/structural
      basis for repeated transfers that could be covered by Art 45/46 mechanisms THEN
