- id: GDPR-ART5-1(b)-purpose-limitation
  title: GDPR Art 5(1(b))
  requirement: Collect personal data for specified, explicit and legitimate purposes
    and do not further process them in a manner incompatible with those purposes.
  audit_procedure:
  - order: 1
    instruction: 'Confirm trigger scope: When collecting personal data and when proposing
      further processing for a new purpose.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Documented purposes for each processing activity; compatibility assessment
      for further processing where applicable.
  - category: technical
    expectation: Purpose tags / metadata on datasets (where used); access controls
      aligned to purposes.
  - category: procedural
    expectation: Change control requiring compatibility assessment before introducing
      new purposes.
  finding_criteria:
  - id: FC-01
    if_condition: IF personal data are further processed for a new purpose without
      documenting the original purpose(s) and a compatibility assessment/legal basis
      for the new purpose THEN non-compliance signal.
    then_outcome: FAIL
    judge_instruction: Return FAIL when condition is met; otherwise continue evaluation.
