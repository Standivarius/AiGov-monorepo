    instruction: 'Confirm trigger scope: When defining data collection, feature sets,
      logs, and retention for a processing purpose.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Data field inventory mapped to purposes; justification for each category/field.
  - category: technical
