- id: GDPR-ART5-1(a)-lawfulness-fairness-transparency
  title: GDPR Art 5(1(a))
  requirement: Process personal data lawfully, fairly, and in a transparent manner
    in relation to the data subject.
  audit_procedure:
  - order: 1
    instruction: 'Confirm trigger scope: Whenever personal data are processed within
      the scope of the GDPR.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Records showing lawful basis selection; privacy notice; fairness
      assessment notes (if any).
  - category: technical
    expectation: Mechanisms to deliver privacy information at or before processing;
      logs proving delivery where applicable.
  - category: procedural
    expectation: Process to review fairness and transparency of processing changes.
  finding_criteria:
