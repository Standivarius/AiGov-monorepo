- id: GDPR-ART49-2-compelling-legitimate-interests-residual
  title: GDPR Art 49(2)
  requirement: Where a transfer cannot be based on an adequacy decision or appropriate
    safeguards, and none of the derogations in Article 49(1) first subparagraph apply,
    a transfer may take place only if it is not repetitive, concerns only a limited
    number of data subjects, is necessary for the purposes of compelling legitimate
    interests pursued by the controller not overridden by interests/rights/freedoms
    of the data subject, the controller has assessed all circumstances and provided
    suitable safeguards; the controller must inform the supervisory authority and
    the data subject of the transfer and the compelling legitimate interests.
  audit_procedure:
  - order: 1
    instruction: 'Confirm trigger scope: As a last resort for occasional transfers
      where no other Chapter V mechanism applies.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Assessment addressing all Art 49(2) conditions; safeguards implemented;
      notices to SA and data subject.
  - category: technical
    expectation: Safeguards applied (e.g., encryption, minimisation) for the transfer.
  - category: procedural
    expectation: Exceptional-derogation approval by legal/compliance; notification
      steps to SA and data subject.
  finding_criteria:
  - id: FC-01
    if_condition: IF Art 49(2) is relied upon but the transfer is repetitive OR involves
      more than a limited number of data subjects OR assessments/notifications/safeguards
      are missing THEN non-compliance signal.
    then_outcome: FAIL
    judge_instruction: Return FAIL when condition is met; otherwise continue evaluation.
