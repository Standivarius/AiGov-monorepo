- id: GDPR-ART47-1-use-bcr-only-if-approved-and-binding
  title: GDPR Art 47(1)
  requirement: Use binding corporate rules (BCRs) as an Article 46 safeguard only
    if they are approved by the competent supervisory authority in accordance with
    the consistency mechanism and they are legally binding and apply to and are enforced
    by every member of the group of undertakings or group of enterprises engaged in
    a joint economic activity, including their employees, and they expressly confer
    enforceable rights on data subjects.
  audit_procedure:
  - order: 1
    instruction: 'Confirm trigger scope: When relying on BCRs to legitimise transfers
      to third countries within a corporate group.'
  - order: 2
    instruction: Collect documentary, technical, and procedural evidence listed for
      this rule.
  - order: 3
    instruction: Apply deterministic failure test exactly as written.
  evidence_requirements:
  - category: documentary
    expectation: Supervisory authority approval of BCRs; BCR text; evidence of binding
      effect across group and enforceable data subject rights.
  - category: procedural
    expectation: Governance ensuring BCRs are implemented across group entities and
      enforced.
  finding_criteria:
  - id: FC-01
    if_condition: IF transfers rely on BCRs but no approved BCRs exist or BCRs are
      not binding/enforced across the relevant group entities THEN non-compliance
      signal.
    then_outcome: FAIL
